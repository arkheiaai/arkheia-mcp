version: "3.9"

# Arkheia Enterprise Proxy + MCP Trust Server
#
# Secrets: inject ARKHEIA_API_KEY from host OS environment.
# Never put real keys in this file.
#
# Usage:
#   ARKHEIA_API_KEY=your-key docker compose up
#
# For local dev without registry:
#   docker compose up

services:
  proxy:
    build:
      context: .
      dockerfile: proxy/Dockerfile
    ports:
      - "8098:8098"                              # Enterprise Proxy on host:8098 (Local Proxy is 8099)
    environment:
      - ARKHEIA_API_KEY=${ARKHEIA_API_KEY:-}     # injected from host, empty = registry disabled
      - ARKHEIA_ENV=${ARKHEIA_ENV:-development}
      - ARKHEIA_REGISTRY_URL=http://registry:8200
      - ARKHEIA_PROXY_PORT=8098
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - ARKHEIA_LICENSE_KEY=${ARKHEIA_LICENSE_KEY:-}   # HMAC key for surface verification
      - ARKHEIA_REQUIRE_LICENSE=${ARKHEIA_REQUIRE_LICENSE:-false}
    volumes:
      - ./profiles:/app/profiles:ro              # read-only; registry writes go to profile_data
      - profile_data:/etc/arkheia/profiles       # writable; registry updates land here
      - audit_logs:/var/log/arkheia
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import httpx; httpx.get('http://localhost:8098/admin/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3

  registry:
    build:
      context: .
      dockerfile: registry_server/Dockerfile
    ports:
      - "8200:8200"
    environment:
      - ARKHEIA_REGISTRY_KEYS=${ARKHEIA_REGISTRY_KEYS:-}
      - ARKHEIA_REGISTRY_PROFILE_DIR=/app/profiles
      - ARKHEIA_REGISTRY_BASE_URL=http://localhost:8200
    volumes:
      - ./profiles:/app/profiles:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import httpx; httpx.get('http://localhost:8200/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3

  mcp_server:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    depends_on:
      proxy:
        condition: service_healthy
    environment:
      - ARKHEIA_PROXY_URL=http://proxy:8099
    # MCP server communicates via stdio by default.
    # For HTTP/SSE transport, uncomment:
    # ports:
    #   - "8100:8100"
    restart: unless-stopped

volumes:
  profile_data:
  audit_logs:
